<!-- Booking Page -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حجوزات ملعب جمعية الراكة</title>

<style>

*{
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

margin:0;

background:linear-gradient(135deg,#eef3f8,#dfe9f5);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:25px;

}

.container{
width:100%;
max-width:450px;
background:#fff;
padding:20px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
margin:10px;
}

h1{
text-align:center;
margin:0 0 20px;
font-size:30px;
color:#0b57d0;
line-height:1.4;
}

.logo{
display:block;
width:120px;
max-width:100%;
margin:0 auto 10px;
}

label{

display:block;

font-size:17px;

font-weight:bold;

margin-bottom:8px;

color:#444;

}

input{

width:100%;

padding:16px;

margin-bottom:18px;

font-size:18px;

border:1px solid #ddd;

border-radius:12px;

outline:none;

transition:.3s;

}

input:focus{

border-color:#0b57d0;

box-shadow:0 0 8px rgba(11,87,208,.25);

}

button{

width:100%;

padding:18px;

font-size:20px;

font-weight:bold;

background:#0b57d0;

color:#fff;

border:none;

border-radius:14px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#0846aa;

}

@media(max-width:600px){

.container{
padding:20px;
border-radius:20px;
}

.logo{
width:100px;
}

h1{
font-size:24px;
line-height:1.4;
}

label{
font-size:16px;
}

input{
font-size:16px;
padding:14px;
}

button{
font-size:18px;
padding:16px;
}

}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>حجوزات ملعب جمعية الراكة</h1>
<label>اسم الفريق</label>
<input id="team" type="text" placeholder="اكتب اسم الفريق" required>

<label>تاريخ الحجز</label>
<input id="bookingDate" type="date" required>

<label>وقت الدخول</label>
<input id="checkIn" type="time" required>

<label>عدد ساعات اللعب</label>
<input id="hours" type="number" placeholder="مثال: 2" required min="1">

<label>المبلغ</label>
<input id="amount" type="number" placeholder="مثال: 200" required min="1">

<button onclick="saveBooking()">

حفظ الحجز

</button>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbx0h3E_0MRK4IEs95J1GxUveNeSnaoBDPfu4SZdHoTRNfU_IrVuR-mrq_zpxXwAXB3vlw/exec";
function saveBooking(){
const team = document.getElementById("team").value.trim();
const date = document.getElementById("bookingDate").value;
const checkIn = document.getElementById("checkIn").value;
const hours = document.getElementById("hours").value;
const amount = document.getElementById("amount").value;
// التحقق من البيانات
if(
team==="" ||
date==="" ||
checkIn==="" ||
hours==="" ||
amount===""
){
    alert("⚠️ يرجى إدخال جميع البيانات");
    return;
}
const day = new Date(date).toLocaleDateString("ar-SA",{
    weekday:"long"
});

fetch(URL,{
    method:"POST",
    body:JSON.stringify({
        team:team,
        bookingDate:date,
        day:day,
        checkIn:checkIn,
        hours:hours,
        amount:amount
    })
})
.then(r=>r.json())
.then(()=>{
    alert("✅ تم حفظ الحجز بنجاح");
    window.location.href="index.html";
})
.catch(()=>{
    alert("❌ حدث خطأ أثناء الحفظ");
});
}

</script>

</body>

</html>
