<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حجوزات ملعب جمعية الراكة</title>

<style>

*{
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

margin:0;

background:linear-gradient(135deg,#eef3f8,#dfe9f5);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:25px;

}

.container{

width:100%;

max-width:600px;

background:#fff;

padding:35px;

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,.15);

}

h1{

text-align:center;

margin:0 0 30px;

font-size:36px;

color:#0b57d0;

}

label{

display:block;

font-size:17px;

font-weight:bold;

margin-bottom:8px;

color:#444;

}

input{

width:100%;

padding:16px;

margin-bottom:18px;

font-size:18px;

border:1px solid #ddd;

border-radius:12px;

outline:none;

transition:.3s;

}

input:focus{

border-color:#0b57d0;

box-shadow:0 0 8px rgba(11,87,208,.25);

}

button{

width:100%;

padding:18px;

font-size:20px;

font-weight:bold;

background:#0b57d0;

color:#fff;

border:none;

border-radius:14px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#0846aa;

}

@media(max-width:600px){

.container{

padding:25px;

}

h1{

font-size:30px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>⚽ حجوزات ملعب جمعية الراكة</h1>

<label>اسم الفريق</label>

<input id="team" placeholder="اكتب اسم الفريق">

<label>تاريخ الحجز</label>

<input id="bookingDate" type="date">

<label>وقت الدخول</label>

<input id="checkIn" type="time">

<label>عدد ساعات اللعب</label>

<input id="hours" type="number" placeholder="مثال: 2">

<label>المبلغ</label>

<input id="amount" type="number" placeholder="مثال: 200">

<button onclick="saveBooking()">

حفظ الحجز

</button>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbyJ-DfkH3qwNsY6fDD1VgzwD0ECYryu-l8GSHkH5sErkBuniGoAlqizFPlrtkuP17PXdA/exec";

function saveBooking(){

let date=document.getElementById("bookingDate").value;

let day=new Date(date).toLocaleDateString(

"ar-SA",

{weekday:"long"}

);

fetch(URL,{

method:"POST",

body:JSON.stringify({

team:document.getElementById("team").value,

bookingDate:date,

day:day,

checkIn:document.getElementById("checkIn").value,

hours:document.getElementById("hours").value,

amount:document.getElementById("amount").value

})

})

.then(()=>{

alert("تم حفظ الحجز بنجاح ✅");

location.reload();

})

.catch(()=>{

alert("حدث خطأ أثناء الحفظ");

});

}

</script>

</body>

</html>
