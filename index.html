<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملعب جمعية الراكة</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#eef3f8,#dfe9f5);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:#fff;
    width:95%;
    max-width:500px;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.logo{
    width:140px;
    margin-bottom:20px;
}

h1{
    color:#0b57d0;
    margin-bottom:35px;
    font-size:32px;
}

.btn{
    display:block;
    width:100%;
    padding:18px;
    margin:15px 0;
    background:#0b57d0;
    color:#fff;
    text-decoration:none;
    border-radius:14px;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#0846aa;
}

@media(max-width:600px){
    h1{
        font-size:26px;
    }

    .logo{
        width:100px;
    }

    .btn{
        font-size:18px;
    }
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>ملعب جمعية الراكة</h1>

<a href="booking.html" class="btn">
📝 تسجيل فريق
</a>

<a href="view.html" class="btn">
📋 عرض الحجوزات
</a>

</div>

</body>
</html>
