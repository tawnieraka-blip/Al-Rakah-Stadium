<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حجوزات ملعب جمعية الراكة</title>
<style>
body{
font-family:Tahoma;
background:#f5f5f5;
padding:30px;
}
.container{
max-width:700px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 0 10px #ccc;
}
h1{
text-align:center;
}
input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}
button{
width:100%;
padding:15px;
font-size:18px;
background:#0b57d0;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
<h1>حجوزات ملعب جمعية الراكة</h1>
<input id="team" placeholder="اسم الفريق">
<input id="bookingDate" type="date">
<input id="checkIn" type="time">
<input id="hours" type="number" placeholder="عدد ساعات اللعب">
<input id="amount" type="number" placeholder="المبلغ">
<button onclick="saveBooking()">
حفظ الحجز
</button>
</div>
<script>
const URL="https://script.google.com/macros/s/AKfycbyJ-DfkH3qwNsY6fDD1VgzwD0ECYryu-l8GSHkH5sErkBuniGoAlqizFPlrtkuP17PXdA/exec";
function saveBooking(){
let date=document.getElementById("bookingDate").value;
let day=new Date(date).toLocaleDateString("ar-SA",{weekday:"long"});
fetch(URL,{
method:"POST",
body:JSON.stringify({
team:document.getElementById("team").value,
bookingDate:date,
day:day,
checkIn:document.getElementById("checkIn").value,
hours:document.getElementById("hours").value,
amount:document.getElementById("amount").value
})
})
.then(()=>{
alert("تم حفظ الحجز");
location.reload();
});
}
</script>
</body>
</html>
